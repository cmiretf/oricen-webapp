name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/add-readme-config-1Hr6s

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAE3k1Nx3rjchDf87D41VoS8VnDp_duVzA
          VITE_FIREBASE_AUTH_DOMAIN: oricen-project.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: oricen-project
          VITE_FIREBASE_STORAGE_BUCKET: oricen-project.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "135853110144"
          VITE_FIREBASE_APP_ID: 1:135853110144:web:15106f9395be0f56588765
          VITE_FIREBASE_MEASUREMENT_ID: G-LSS6MBFZ3Q
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
